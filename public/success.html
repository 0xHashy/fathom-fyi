<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to Fathom</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0A0A08;
      color: #F5F0E8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }
    .card {
      max-width: 600px;
      width: 100%;
    }
    .logo {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      font-weight: 600;
      color: #F5F0E8;
      margin-bottom: 48px;
      letter-spacing: 0.05em;
    }
    .logo::before { content: '\25C6 '; color: #C9A84C; font-size: 8px; vertical-align: 1px; }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 42px;
      font-weight: 400;
      line-height: 1.1;
      margin-bottom: 12px;
    }
    h1 em { font-weight: 600; font-style: italic; color: #C9A84C; }
    .subtitle {
      font-size: 15px;
      color: #8A8578;
      margin-bottom: 48px;
      line-height: 1.6;
    }
    .key-section {
      border: 1px solid #2A2A26;
      background: #111110;
      padding: 24px;
      margin-bottom: 32px;
    }
    .key-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #C9A84C;
      margin-bottom: 12px;
    }
    .key-value {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      color: #F5F0E8;
      word-break: break-all;
      background: #0A0A08;
      padding: 14px 16px;
      border: 1px solid #2A2A26;
      margin-bottom: 12px;
      cursor: pointer;
      transition: border-color 0.2s;
      position: relative;
    }
    .key-value:hover { border-color: #C9A84C; }
    .key-value.copied { border-color: #4A9B6F; }
    .key-value.copied::after {
      content: 'COPIED';
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 9px;
      letter-spacing: 0.15em;
      color: #4A9B6F;
    }
    .key-hint {
      font-size: 12px;
      color: #4A4840;
    }
    .tier-badge {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #C9A84C;
      border: 1px solid #C9A84C;
      padding: 4px 12px;
      display: inline-block;
      margin-bottom: 24px;
    }
    .steps {
      border-top: 1px solid #2A2A26;
      padding-top: 32px;
    }
    .steps h2 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #8A8578;
      margin-bottom: 20px;
    }
    .step {
      margin-bottom: 20px;
    }
    .step-num {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: #C9A84C;
      margin-bottom: 4px;
    }
    .step p {
      font-size: 14px;
      color: #8A8578;
      line-height: 1.6;
    }
    .step code {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: #C9A84C;
      background: #0A0A08;
      padding: 2px 6px;
      border: 1px solid #2A2A26;
    }
    .loading { color: #4A4840; font-family: 'IBM Plex Mono', monospace; font-size: 13px; }
    .error { color: #8B2E2E; font-family: 'IBM Plex Mono', monospace; font-size: 13px; }
    .back {
      display: inline-block;
      margin-top: 32px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #8A8578;
      text-decoration: none;
      border: 1px solid #2A2A26;
      padding: 10px 24px;
      transition: all 0.2s;
    }
    .back:hover { border-color: #8A8578; color: #F5F0E8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">FATHOM</div>
    <div id="content">
      <p class="loading">Retrieving your API key...</p>
    </div>
  </div>

  <script>
    async function loadKey() {
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get('session_id');
      const content = document.getElementById('content');

      if (!sessionId) {
        content.innerHTML = '<p class="error">No session ID found. If you just paid, check your email or contact support.</p><a href="/" class="back">Back to Fathom</a>';
        return;
      }

      // Retry a few times (webhook may still be processing)
      let data = null;
      for (let attempt = 0; attempt < 5; attempt++) {
        try {
          const res = await fetch(`/api/session?session_id=${sessionId}`);
          data = await res.json();
          if (data.key) break;
        } catch {}
        await new Promise(r => setTimeout(r, 2000));
      }

      if (!data || !data.key) {
        content.innerHTML = '<p class="error">Could not retrieve your API key. Payment may still be processing. Refresh this page in 30 seconds, or contact support.</p><a href="/" class="back">Back to Fathom</a>';
        return;
      }

      content.innerHTML = `
        <h1>Welcome to <em>Fathom</em></h1>
        <p class="subtitle">Your subscription is active. Here is your API key.</p>
        <div class="tier-badge">${data.tier} TIER</div>
        <div class="key-section">
          <div class="key-label">Your API Key</div>
          <div class="key-value" id="key-display" onclick="copyKey()">${data.key}</div>
          <div class="key-hint">Click to copy. Keep this secret. Do not share it publicly.</div>
        </div>
        <div class="steps">
          <h2>Next Steps</h2>
          <div class="step">
            <div class="step-num">01</div>
            <p>Add your key to your MCP config:<br><code>"FATHOM_API_KEY": "${data.key}"</code></p>
          </div>
          <div class="step">
            <div class="step-num">02</div>
            <p>Restart your MCP client (Claude Desktop, Cursor, etc.)</p>
          </div>
          <div class="step">
            <div class="step-num">03</div>
            <p>Call <code>get_reality_check</code> — you now have full access.</p>
          </div>
        </div>
        <a href="/" class="back">Back to Fathom</a>
      `;
    }

    function copyKey() {
      const el = document.getElementById('key-display');
      navigator.clipboard.writeText(el.textContent);
      el.classList.add('copied');
      setTimeout(() => el.classList.remove('copied'), 2000);
    }

    loadKey();
  </script>
</body>
</html>
